name: Release precompiled NIFs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  precompile:
    name: Precompile ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native-host targets (phase 1).
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-linux-gnu
            os: ubuntu-24.04
          # Linux cross-compile targets (phase 2). All three run on
          # a stock ubuntu-24.04 runner and share one toolchain: zig
          # (for the C link step, via cc_precompiler's zig cc 4-tuple
          # in mix.exs) + cargo-zigbuild (for the Rust staticlib side,
          # enabled via EX_H3O_USE_ZIGBUILD=1). TARGET_ARCH/OS/ABI
          # pin cc_precompiler's `current_target` to the musl/gnu
          # triple so each runner emits one artifact for its matrix
          # entry instead of defaulting to the x86_64-linux-gnu host.
          - target: aarch64-linux-gnu
            os: ubuntu-24.04
            target_arch: aarch64
            target_os: linux
            target_abi: gnu
            zigbuild: "1"
          - target: x86_64-linux-musl
            os: ubuntu-24.04
            target_arch: x86_64
            target_os: linux
            target_abi: musl
            zigbuild: "1"
          - target: aarch64-linux-musl
            os: ubuntu-24.04
            target_arch: aarch64
            target_os: linux
            target_abi: musl
            zigbuild: "1"
    env:
      MIX_ENV: prod
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.2"

      - uses: dtolnay/rust-toolchain@stable

      # Phase 2 cross-compile setup. `rustup target add` gives rustc
      # the precompiled std for the Rust target; `mlugg/setup-zig`
      # installs zig (cached across runs); `cargo install
      # cargo-zigbuild` wires cargo to use zig's cross-linker. Steps
      # are gated on the matrix.zigbuild flag so the native-host
      # targets skip them entirely.
      - name: Install Rust target ${{ matrix.target }}
        if: matrix.zigbuild == '1'
        run: |
          case "${{ matrix.target }}" in
            aarch64-linux-gnu)
              rustup target add aarch64-unknown-linux-gnu
              ;;
            x86_64-linux-musl)
              rustup target add x86_64-unknown-linux-musl
              ;;
            aarch64-linux-musl)
              rustup target add aarch64-unknown-linux-musl
              ;;
          esac

      - name: Install zig
        if: matrix.zigbuild == '1'
        uses: mlugg/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Install cargo-zigbuild
        if: matrix.zigbuild == '1'
        run: cargo install --locked cargo-zigbuild

      - name: Install deps
        run: mix deps.get

      - name: Build precompiled NIF for ${{ matrix.target }}
        env:
          # With `cc_precompiler: [only_listed_targets: true]` in
          # mix.exs, this env var pins each runner to its host
          # triple so the matrix emits exactly one tarball per job.
          # For phase 2 cross jobs we ALSO set TARGET_ARCH/OS/ABI
          # below, which overrides the host-triple detection to
          # force the intended cross target.
          CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
          # Pin the tarball output to ./cache/ so the upload glob
          # below is reliable. Without this, elixir_make writes to
          # :filename.basedir(:user_cache, "elixir_make", ...),
          # which varies by OS.
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/cache
          # Phase 2 cross-compile toggles. Empty for native jobs.
          TARGET_ARCH: ${{ matrix.target_arch }}
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ABI: ${{ matrix.target_abi }}
          EX_H3O_USE_ZIGBUILD: ${{ matrix.zigbuild }}
        run: mix elixir_make.precompile

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cache/*.tar.gz
