name: Release precompiled NIFs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  precompile:
    name: Precompile ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-linux-gnu
            os: ubuntu-24.04
    env:
      MIX_ENV: prod
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.2"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: mix deps.get

      - name: Build precompiled NIF for ${{ matrix.target }}
        env:
          # With `cc_precompiler: [only_listed_targets: true]` in
          # mix.exs, this env var pins each runner to its host
          # triple so the matrix emits exactly one tarball per job.
          CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
          # Pin the tarball output to ./cache/ so the upload glob
          # below is reliable. Without this, elixir_make writes to
          # :filename.basedir(:user_cache, "elixir_make", ...),
          # which varies by OS.
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/cache
        run: mix elixir_make.precompile

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cache/*.tar.gz
