name: Release precompiled NIFs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  precompile:
    name: Precompile ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native-host targets (phase 1).
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-linux-gnu
            os: ubuntu-24.04
          # Linux cross-compile targets (phase 2).
          #
          # aarch64-linux-gnu uses Ubuntu's stock `gcc-aarch64-linux-gnu`
          # apt package (installed below, keyed on matrix.apt_packages)
          # for the C link step, driven by cc_precompiler's default
          # `"aarch64-linux-gnu-"` prefix. We cannot override this
          # target's compiler in mix.exs because cc_precompiler has a
          # bug in compilers_current_os_with_override
          # (lib/cc_precompiler.ex:72) that drops user overrides for
          # keys already present in the default map. See mix.exs
          # comment on the cc_precompiler: block for the full story.
          #
          # musl targets are NOT in cc_precompiler's default map, so
          # our zig cc 4-tuple override in mix.exs applies unchanged.
          #
          # Rust builds for all three Linux cross targets go through
          # `cargo zigbuild` via the EX_H3O_USE_ZIGBUILD=1 Makefile
          # toggle, keeping one Rust toolchain across the matrix.
          # TARGET_ARCH/OS/ABI pin cc_precompiler's current_target to
          # the cross triple (otherwise the runner's host triple
          # x86_64-linux-gnu wins).
          - target: aarch64-linux-gnu
            os: ubuntu-24.04
            target_arch: aarch64
            target_os: linux
            target_abi: gnu
            zigbuild: "1"
            apt_packages: "gcc-aarch64-linux-gnu g++-aarch64-linux-gnu"
          - target: x86_64-linux-musl
            os: ubuntu-24.04
            target_arch: x86_64
            target_os: linux
            target_abi: musl
            zigbuild: "1"
          - target: aarch64-linux-musl
            os: ubuntu-24.04
            target_arch: aarch64
            target_os: linux
            target_abi: musl
            zigbuild: "1"
    env:
      MIX_ENV: prod
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.2"

      - uses: dtolnay/rust-toolchain@stable

      # Phase 2 cross-compile setup. Matrix-specific apt packages
      # (e.g. `gcc-aarch64-linux-gnu` for the glibc aarch64 target's
      # C link step); `rustup target add` for the Rust staticlib;
      # `mlugg/setup-zig` + `cargo-zigbuild` for the Rust build
      # driver. All steps gated on matrix.zigbuild so native jobs
      # skip them.
      - name: Install apt cross-compiler packages
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install Rust target ${{ matrix.target }}
        if: matrix.zigbuild == '1'
        run: |
          case "${{ matrix.target }}" in
            aarch64-linux-gnu)
              rustup target add aarch64-unknown-linux-gnu
              ;;
            x86_64-linux-musl)
              rustup target add x86_64-unknown-linux-musl
              ;;
            aarch64-linux-musl)
              rustup target add aarch64-unknown-linux-musl
              ;;
          esac

      - name: Install zig
        if: matrix.zigbuild == '1'
        uses: mlugg/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Install cargo-zigbuild
        if: matrix.zigbuild == '1'
        run: cargo install --locked cargo-zigbuild

      - name: Install deps
        run: mix deps.get

      - name: Build precompiled NIF for ${{ matrix.target }}
        env:
          # With `cc_precompiler: [only_listed_targets: true]` in
          # mix.exs, this env var pins each runner to its host
          # triple so the matrix emits exactly one tarball per job.
          # For phase 2 cross jobs we ALSO set TARGET_ARCH/OS/ABI
          # in the shell conditional below, which overrides the
          # host-triple detection to force the intended cross target.
          CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
          # Pin the tarball output to ./cache/ so the upload glob
          # below is reliable. Without this, elixir_make writes to
          # :filename.basedir(:user_cache, "elixir_make", ...),
          # which varies by OS.
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/cache
        # The TARGET_* + EX_H3O_USE_ZIGBUILD exports are scoped to
        # the run block via a shell conditional so they do NOT leak
        # to native-host matrix entries. Setting them as top-level
        # step env vars via `${{ matrix.target_arch }}` would
        # interpolate to empty strings on native jobs, and
        # cc_precompiler's `current_target_from_env` (cc_precompiler.ex:97-105)
        # treats empty strings as "set" (it uses `is_nil/1`), so
        # current_target would resolve to `"--"` and the precompile
        # would silently produce zero artifacts.
        run: |
          if [ -n "${{ matrix.target_arch }}" ]; then
            export TARGET_ARCH="${{ matrix.target_arch }}"
            export TARGET_OS="${{ matrix.target_os }}"
            export TARGET_ABI="${{ matrix.target_abi }}"
            export EX_H3O_USE_ZIGBUILD="${{ matrix.zigbuild }}"
          fi
          mix elixir_make.precompile

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cache/*.tar.gz
